<?xml version="1.0" encoding="UTF-8"?>
<svg width="280" height="280" viewBox="0 0 280 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1e3260"/>
      <stop offset="100%" stop-color="#0a1228"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="48%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#FFD5A8"/>
      <stop offset="100%" stop-color="#F0A868"/>
    </radialGradient>
    <radialGradient id="faceGrad2" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFD0A0"/>
      <stop offset="100%" stop-color="#E89858"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0a1228" flood-opacity="0.5"/>
    </filter>
    <clipPath id="circleClip">
      <circle cx="140" cy="140" r="136"/>
    </clipPath>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a2e50"/>
      <stop offset="100%" stop-color="#0d1a30"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5b8def" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7ba8f5" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="140" cy="140" r="140" fill="url(#bgGrad)"/>

  <!-- Outer glow ring -->
  <circle cx="140" cy="140" r="137" fill="none" stroke="#5b8def" stroke-width="2.5" opacity="0.8" filter="url(#glow)"/>
  <circle cx="140" cy="140" r="133" fill="none" stroke="#3a6cc0" stroke-width="1" opacity="0.3"/>

  <g clip-path="url(#circleClip)">

    <!-- ── SHIRT / HOODIE ── -->
    <path d="M-5,280 L-5,230 Q10,195 55,182 L95,175 L140,205 L185,175 L225,182 Q270,195 285,230 L285,280 Z"
          fill="url(#shirtGrad)"/>
    <!-- Hoodie front pocket area -->
    <path d="M108,240 L172,240 L168,276 L112,276 Z" fill="#162240" opacity="0.7"/>
    <!-- Hoodie strings -->
    <line x1="132" y1="208" x2="126" y2="258" stroke="#243660" stroke-width="3" stroke-linecap="round"/>
    <line x1="148" y1="208" x2="154" y2="258" stroke="#243660" stroke-width="3" stroke-linecap="round"/>
    <!-- String ends -->
    <circle cx="125" cy="260" r="4" fill="#1e3060"/>
    <circle cx="155" cy="260" r="4" fill="#1e3060"/>
    <!-- Collar V -->
    <path d="M125,205 L140,222 L155,205" fill="none" stroke="#243a6a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Shoulder seams -->
    <path d="M55,182 Q70,178 90,180" stroke="#243a6a" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M225,182 Q210,178 190,180" stroke="#243a6a" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Blue accent stripe on shoulder -->
    <path d="M30,205 Q50,192 75,187" stroke="#5b8def" stroke-width="1.5" fill="none" opacity="0.4"/>
    <path d="M250,205 Q230,192 205,187" stroke="#5b8def" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- ── NECK ── -->
    <rect x="120" y="174" width="40" height="38" rx="8" fill="url(#faceGrad)" filter="url(#softShadow)"/>
    <!-- Neck shadow -->
    <rect x="120" y="195" width="40" height="17" rx="0" fill="#D08040" opacity="0.18"/>

    <!-- ── HEAD ── -->
    <ellipse cx="140" cy="132" rx="70" ry="78" fill="url(#faceGrad)" filter="url(#softShadow)"/>

    <!-- Left ear -->
    <ellipse cx="70" cy="138" rx="9.5" ry="13" fill="url(#faceGrad2)"/>
    <path d="M72,130 Q78,138 72,146" stroke="#D08848" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- Right ear -->
    <ellipse cx="210" cy="138" rx="9.5" ry="13" fill="url(#faceGrad2)"/>
    <path d="M208,130 Q202,138 208,146" stroke="#D08848" stroke-width="1.5" fill="none" stroke-linecap="round"/>

    <!-- ── HAIR ── -->
    <!-- Hair main volume -->
    <ellipse cx="140" cy="75" rx="72" ry="40" fill="#110d0a"/>
    <!-- Hair sides + top -->
    <path d="M68,120 Q68,68 140,58 Q212,68 212,120 L212,96 Q210,52 140,50 Q70,52 68,96 Z" fill="#110d0a"/>
    <!-- Left side -->
    <path d="M68,120 Q66,98 70,82 Q76,105 78,128 Z" fill="#110d0a"/>
    <!-- Right side -->
    <path d="M212,120 Q214,98 210,82 Q204,105 202,128 Z" fill="#110d0a"/>
    <!-- Hair highlight (subtle) -->
    <path d="M112,62 Q130,57 148,60" stroke="#2a2018" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M152,60 Q164,58 175,63" stroke="#2a2018" stroke-width="1.5" fill="none" opacity="0.4" stroke-linecap="round"/>

    <!-- ── EYEBROWS ── -->
    <path d="M98,112 Q111,106 126,110" stroke="#110d0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <path d="M154,110 Q169,106 182,112" stroke="#110d0a" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- ── GLASSES ── -->
    <!-- Left lens -->
    <rect x="94" y="116" width="40" height="27" rx="9" fill="url(#glassGrad)" stroke="#5b8def" stroke-width="2.3"/>
    <!-- Right lens -->
    <rect x="146" y="116" width="40" height="27" rx="9" fill="url(#glassGrad)" stroke="#5b8def" stroke-width="2.3"/>
    <!-- Bridge -->
    <path d="M134,129 C136,126 144,126 146,129" stroke="#5b8def" stroke-width="2.3" fill="none"/>
    <!-- Left temple -->
    <path d="M94,129 L76,133" stroke="#5b8def" stroke-width="2.3" stroke-linecap="round"/>
    <!-- Right temple -->
    <path d="M186,129 L204,133" stroke="#5b8def" stroke-width="2.3" stroke-linecap="round"/>
    <!-- Lens glare -->
    <path d="M98,120 L104,120" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
    <path d="M150,120 L156,120" stroke="white" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>

    <!-- ── EYES ── -->
    <ellipse cx="114" cy="130" rx="14" ry="12" fill="white"/>
    <ellipse cx="166" cy="130" rx="14" ry="12" fill="white"/>
    <!-- Iris -->
    <circle cx="114" cy="131" r="9" fill="#1e1208"/>
    <circle cx="166" cy="131" r="9" fill="#1e1208"/>
    <!-- Pupils -->
    <circle cx="115" cy="132" r="5.5" fill="#0a0806"/>
    <circle cx="167" cy="132" r="5.5" fill="#0a0806"/>
    <!-- Main shine -->
    <circle cx="117" cy="129" r="2.8" fill="white" opacity="0.9"/>
    <circle cx="169" cy="129" r="2.8" fill="white" opacity="0.9"/>
    <!-- Secondary shine -->
    <circle cx="112" cy="133" r="1.3" fill="white" opacity="0.35"/>
    <circle cx="164" cy="133" r="1.3" fill="white" opacity="0.35"/>

    <!-- ── NOSE ── -->
    <path d="M136,150 Q140,162 144,162" stroke="#C07838" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <path d="M132,163 Q140,168 148,163" stroke="#C07838" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    <circle cx="130" cy="163" r="3.5" fill="#C07838" opacity="0.25"/>
    <circle cx="150" cy="163" r="3.5" fill="#C07838" opacity="0.25"/>

    <!-- ── SMILE ── -->
    <path d="M120,177 Q140,190 160,177" stroke="#B06040" stroke-width="2.8" fill="none" stroke-linecap="round"/>
    <!-- Lip color hint -->
    <path d="M122,177 Q140,183 158,177" fill="#E08860" opacity="0.15"/>
    <!-- Cheek blush (subtle) -->
    <ellipse cx="97" cy="162" rx="12" ry="7" fill="#FF9060" opacity="0.1"/>
    <ellipse cx="183" cy="162" rx="12" ry="7" fill="#FF9060" opacity="0.1"/>

  </g>
</svg>
